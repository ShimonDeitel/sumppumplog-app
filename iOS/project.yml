name: SumpPumpLog
options:
  bundleIdPrefix: com.shimondeitel.sumppumplog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SumpPumpLog:
    type: application
    platform: iOS
    sources:
      - path: SumpPumpLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sumppumplog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SumpPumpLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SumpPumpLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SumpPumpLogTests
      - path: SumpPumpLog.storekit
    dependencies:
      - target: SumpPumpLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sumppumplog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SumpPumpLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SumpPumpLogUITests
    dependencies:
      - target: SumpPumpLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sumppumplog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SumpPumpLog:
    build:
      targets:
        SumpPumpLog: all
        SumpPumpLogTests: [test]
        SumpPumpLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SumpPumpLog.storekit
    test:
      config: Debug
      storeKitConfiguration: SumpPumpLog.storekit
      targets:
        - SumpPumpLogTests
        - SumpPumpLogUITests
    archive:
      config: Release
